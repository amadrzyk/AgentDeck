name: Apple Release (TestFlight)

on:
  push:
    tags:
      - 'apple-v*'

permissions:
  contents: write

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE"
          sudo xcode-select -s "$XCODE/Contents/Developer"

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#apple-v}" >> "$GITHUB_OUTPUT"

      - name: Install Apple certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          echo -n "$APPLE_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Create App Store Connect API key
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/private_keys
          echo -n "$ASC_API_KEY_BASE64" | base64 --decode -o ~/private_keys/AuthKey_${ASC_API_KEY_ID}.p8

      - name: Install iOS provisioning profile
        env:
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo -n "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(security cms -D -i $PP_PATH | plutil -extract UUID raw -)
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          echo "Installed iOS profile: $UUID"

      - name: Archive iOS
        run: |
          xcodebuild archive \
            -project apple/AgentDeck.xcodeproj \
            -scheme AgentDeck_iOS \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/AgentDeck_iOS.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.ASC_API_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.ASC_ISSUER_ID }} \
            MARKETING_VERSION=${{ steps.version.outputs.VERSION }} \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=R22679GY5Z \
            ENABLE_PREVIEWS=NO

      - name: Verify iOS App Store archive invariants
        # Mirrors the macOS verification: guards against bundled helpers
        # (Apple 2.5.2), `home-relative-path` entitlement exceptions, and
        # stray embedded executables slipping into the iOS archive. iOS
        # builds don't run copy-adb.sh so these should always pass, but
        # the gate is free insurance against future build-script drift.
        run: |
          bash apple/scripts/verify-appstore-archive.sh \
            $RUNNER_TEMP/AgentDeck_iOS.xcarchive/Products/Applications/AgentDeck.app

      - name: Export iOS IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/AgentDeck_iOS.xcarchive \
            -exportOptionsPlist apple/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export_ios \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.ASC_API_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.ASC_ISSUER_ID }}

      - name: Upload iOS to TestFlight
        run: |
          xcrun altool --upload-app \
            -f $RUNNER_TEMP/export_ios/AgentDeck.ipa \
            -t ios \
            --apiKey ${{ secrets.ASC_API_KEY_ID }} \
            --apiIssuer ${{ secrets.ASC_ISSUER_ID }}

      - name: Cleanup
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
          rm -f $RUNNER_TEMP/certificate.p12
          rm -rf ~/private_keys

  # macOS App Store upload. Keep disabled until Mac App Store distribution
  # prerequisites are provisioned on this team:
  #   1. "Mac Installer Distribution" cert (P12) → APPLE_MAC_INSTALLER_CERT_BASE64 secret
  #   2. macOS Provisioning Profile for bound.serendipity.agentdeck.dashboard → MACOS_PROVISIONING_PROFILE_BASE64 secret
  #   3. The app group `group.bound.serendipity.agentdeck.dashboard` registered under the team in App Store Connect
  #   4. apple/ExportOptions-macOS.plist populated with `<key>method</key><string>app-store-connect</string>`
  # Once those are in place, flip `if: false` → `if: true` and `release.needs`
  # below to include `build-macos`. First run should be dry — watch for
  # cert/profile mismatches before promoting to a real TestFlight build.
  build-macos:
    if: false
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE"
          sudo xcode-select -s "$XCODE/Contents/Developer"

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#apple-v}" >> "$GITHUB_OUTPUT"

      - name: Install Apple certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          echo -n "$APPLE_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Create App Store Connect API key
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/private_keys
          echo -n "$ASC_API_KEY_BASE64" | base64 --decode -o ~/private_keys/AuthKey_${ASC_API_KEY_ID}.p8

      - name: Install macOS provisioning profile
        env:
          MACOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.MACOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/profile.provisionprofile
          echo -n "$MACOS_PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(security cms -D -i $PP_PATH | plutil -extract UUID raw -)
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.provisionprofile
          echo "Installed macOS profile: $UUID"

      - name: Archive macOS
        run: |
          xcodebuild archive \
            -project apple/AgentDeck.xcodeproj \
            -scheme AgentDeck_macOS \
            -destination 'generic/platform=macOS' \
            -archivePath $RUNNER_TEMP/AgentDeck_macOS.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.ASC_API_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.ASC_ISSUER_ID }} \
            MARKETING_VERSION=${{ steps.version.outputs.VERSION }} \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=R22679GY5Z

      - name: Verify App Store archive invariants
        # Fails the build if bundled Node/adb/bridge helpers, iOS-only plist
        # keys, home-relative-path entitlement, or subprocess path strings
        # somehow leaked into the .app. Apple Guideline 2.5.2 enforcement.
        run: |
          bash apple/scripts/verify-appstore-archive.sh \
            $RUNNER_TEMP/AgentDeck_macOS.xcarchive/Products/Applications/AgentDeck.app

      - name: Export macOS pkg
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/AgentDeck_macOS.xcarchive \
            -exportOptionsPlist apple/ExportOptions-macOS.plist \
            -exportPath $RUNNER_TEMP/export_macos \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.ASC_API_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.ASC_ISSUER_ID }}

      - name: Upload macOS to App Store Connect
        run: |
          xcrun altool --upload-app \
            -f $RUNNER_TEMP/export_macos/AgentDeck.pkg \
            -t macos \
            --apiKey ${{ secrets.ASC_API_KEY_ID }} \
            --apiIssuer ${{ secrets.ASC_ISSUER_ID }}

      - name: Cleanup
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
          rm -f $RUNNER_TEMP/certificate.p12
          rm -rf ~/private_keys

  release:
    needs: [build-ios]
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "AgentDeck Apple v${{ github.ref_name }}"
          body: |
            ## AgentDeck Apple ${{ github.ref_name }}

            Universal dashboard app for monitoring coding agent sessions.

            ### Install via TestFlight
            1. Open **TestFlight** on your iPhone/iPad/Mac
            2. Accept the invite or check for available builds
            3. Install **AgentDeck Dashboard**
