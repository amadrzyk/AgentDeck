<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <script src="sdpi-components.js"></script>
  <style>
    .sdpi-info {
      margin: 0 1em 0.5em;
      padding: 0.5em 0.75em;
      font-size: 11px;
      color: #999;
      line-height: 1.5;
      border-left: 2px solid #444;
    }
    .sdpi-info code {
      background: #333;
      padding: 1px 4px;
      border-radius: 3px;
      color: #ccc;
    }
    .slot-display {
      margin: 0 1em 0.5em;
      padding: 0.5em 0.75em;
      font-size: 11px;
      color: #7aa2d4;
      line-height: 1.5;
      background: rgba(30, 58, 95, 0.3);
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="slot-display" id="slotDisplay">Slot: auto-assigned</div>
  <sdpi-item label="Custom Label">
    <sdpi-textfield setting="label" id="piLabel" placeholder="GO ON"></sdpi-textfield>
  </sdpi-item>
  <sdpi-item label="Custom Action">
    <sdpi-textarea setting="action" id="piAction" placeholder="continue"></sdpi-textarea>
  </sdpi-item>
  <div class="sdpi-info">
    Leave empty to use slot defaults.<br/>
    Examples: <code>/compact</code> <code>/status</code> — slash command<br/>
    <code>Please fix the bug</code> — prompt to Claude
  </div>
  <hr />
  <sdpi-item label="When Disconnected">
    <sdpi-textfield setting="disconnectedLabel" placeholder="START"></sdpi-textfield>
  </sdpi-item>
  <sdpi-item label="Shell Command">
    <sdpi-textfield setting="disconnectedAction" placeholder="sdc"></sdpi-textfield>
  </sdpi-item>
  <div class="sdpi-info">
    Shell command to run when no session is connected.
  </div>
  <sdpi-item label="Base Directory">
    <sdpi-textfield setting="baseDir" placeholder="~/Documents"></sdpi-textfield>
  </sdpi-item>
  <div class="sdpi-info">
    Base directory to scan for projects. Subfolders with <code>.git</code> will be listed.
  </div>
  <script>
    SDPIComponents.streamDeckClient.didReceiveSettings.subscribe(function(jsn) {
      const settings = jsn.payload?.settings ?? {};
      const idx = Number(settings.slotIndex ?? 0);
      const display = document.getElementById('slotDisplay');
      if (display) {
        display.textContent = 'Slot ' + (idx + 1);
      }
    });
  </script>
</body>
</html>
